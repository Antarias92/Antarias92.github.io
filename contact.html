<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./CSS/styles.css">
</head>

<body class="bg-body-tertiary">
    <header class="container-fluid">
        <nav class="navbar navbar-expand-md fixed-top bg-dark">
            <div class="container-fluid">
              <a class="navbar-brand logo text-white" href="./index.html">Anthony's Portfolio</a>
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#headerNavigation" aria-controls="headerNavigation" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="headerNavigation">
                <ul class="navbar-nav mx-auto mb-2 mb-md-0">
                  <li class="nav-item menu-item">
                    <a class="nav-link" aria-current="page" href="./index.html">Home</a>
                  </li>
                  <li class="nav-item menu-item">
                    <a class="nav-link" href="star.html">S.T.A.R.</a>
                  </li>
                  <li class="nav-item menu-item">
                    <a class="nav-link" href="./gallery.html">Works Gallery</a>
                  </li>
                  <li class="nav-item menu-item">
                    <a class="nav-link text-white-50 active" href="./contact.html">Contact</a>
                  </li>
                </ul>
                <div class="navbar-text">
                    <ul class="social">
                        <li class="social_icons">
                            <a href="https://www.linkedin.com/in/anthony-arias-/" target="_blank">
                                <img class="icon" src="./Images/linkedin-48.png" alt="LinkedIn" />
                            </a>
                        </li>
                        <li class="social_icons">
                            <a href="https://www.youtube.com/@rareviewscollectibles7393" target="_blank">
                                <img class="icon" src="./Images/youtube-48.png" alt="YouTube" />
                            </a>
                        </li>
                    </ul>
                </div>
              </div>
            </div>
          </nav>
    </header>
    <main class="container-fluid">
        <section class="container-fluid email_form w-75">
            <form>
            <div class="row">
                <div class="col mb-3 form-floating">
                  <input type="text" class="form-control" placeholder="First name" aria-label="First name" required>
                  <label for="contact-email" class="form-label ms-3">First name</label>
                </div>
                <div class="col mb-3 form-floating">
                  <input type="text" class="form-control" placeholder="Last name" aria-label="Last name" required>
                  <label for="contact-email" class="form-label ms-3">Last name</label>
                </div>
                <div class="mb-3 form-floating">
                    <input type="email" class="form-control" id="contact-email" name="contact-email" aria-label="E-mail" placeholder="E-mail" required/>  
                    <label for="contact-email" class="form-label ms-3">E-mail</label>
                </div>
                <div class="mb-3">
                    <select class="form-select mb-3" aria-label="Default select example">
                        <option selected>Nature of this message</option>
                        <option value="1">Professional</option>
                        <option value="2">Casual</option>
                      </select>
                      <label for="message" class="form-label">Message</label>
                      <textarea class="form-control" id="message" rows="4" name="message" required></textarea>
                </div>
                <div class="mb-3 form-check d-grid col-6 mx-auto">
                    <button type="submit" class="btn btn-dark">Submit Message</button>
                </div>
            </div>
            </form>
            <hr class="opacity-25">
        </section>
    </main>

    <footer class="container-fluid">
        <div class="row text-center m-4">
            <div class="col col-12">&copy; Anthony Arias 2025</div>
        </div>
    </footer>
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>
